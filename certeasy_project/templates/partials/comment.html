<div class="flex items-start space-x-3 mb-2">
  <img src="https://ui-avatars.com/api/?name={{ comment.user.get_full_name|default:comment.user.username }}&background=10B981&color=fff" class="w-8 h-8 rounded-full" alt="{{ comment.user.username }}">
  <div class="flex-1 bg-gray-50 rounded-lg p-3">
    <div class="flex items-center space-x-2 mb-1">
      <span class="font-medium text-gray-800 text-sm">{{ comment.user.get_full_name|default:comment.user.username }}</span>
      <span class="text-xs text-gray-500">{{ comment.created_at|timesince }} ago</span>
      {% if user == comment.user %}
        <button class="text-xs text-blue-600 ml-2 edit-comment-btn" data-comment-id="{{ comment.id }}">Edit</button>
        <button class="text-xs text-red-600 ml-1 delete-comment-btn" data-comment-id="{{ comment.id }}">Delete</button>
      {% endif %}
    </div>
    <div class="text-gray-700 text-sm">
      {{ comment.body|linebreaksbr }}
    </div>
  </div>
</div>
