{% extends 'dashboard.html' %}
{% load static %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Update Study Plan</h1>
            <a href="{% url 'study_plans:list' %}"
               class="text-blue-600 hover:text-blue-800">
                Back to List
            </a>
        </div>

        <form method="post" class="bg-white rounded-lg shadow-md p-6">
            {% csrf_token %}

            <div class="space-y-6">
                <!-- Title -->
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">
                        Title
                    </label>
                    <input type="text" name="title" id="title" required
                           value="{{ study_plan.title }}"
                           class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                </div>

                <!-- Date and Time -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="scheduled_date" class="block text-sm font-medium text-gray-700 mb-1">
                            Date
                        </label>
                        <input type="date" name="scheduled_date" id="scheduled_date" required
                               value="{{ study_plan.scheduled_date|date:'Y-m-d' }}"
                               class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="scheduled_time" class="block text-sm font-medium text-gray-700 mb-1">
                            Time
                        </label>
                        <input type="time" name="scheduled_time" id="scheduled_time" required
                               value="{{ study_plan.scheduled_time|time:'H:i' }}"
                               class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                    </div>
                </div>

                <!-- Duration -->
                <div>
                    <label for="duration" class="block text-sm font-medium text-gray-700 mb-1">
                        Duration (minutes)
                    </label>
                    <input type="number" name="duration" id="duration" required min="15" step="15"
                           value="{{ study_plan.duration }}"
                           class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                </div>

                <!-- Status -->
                <div>
                    <label for="status" class="block text-sm font-medium text-gray-700 mb-1">
                        Status
                    </label>
                    <select name="status" id="status" required
                            class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                        <option value="pending" {% if study_plan.status == 'pending' %}selected{% endif %}>Pending</option>
                        <option value="in_progress" {% if study_plan.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                        <option value="completed" {% if study_plan.status == 'completed' %}selected{% endif %}>Completed</option>
                    </select>
                </div>

                <!-- Exam Details (if applicable) -->
                {% if study_plan.activity_type == 'exam' %}
                <div class="space-y-4">
                    <div>
                        <label for="exam_date" class="block text-sm font-medium text-gray-700 mb-1">
                            Exam Date
                        </label>
                        <input type="date" name="exam_date" id="exam_date"
                               value="{{ study_plan.exam_date|date:'Y-m-d' }}"
                               class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="exam_time" class="block text-sm font-medium text-gray-700 mb-1">
                            Exam Time
                        </label>
                        <input type="time" name="exam_time" id="exam_time"
                               value="{{ study_plan.exam_time|time:'H:i' }}"
                               class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="exam_location" class="block text-sm font-medium text-gray-700 mb-1">
                            Exam Location
                        </label>
                        <input type="text" name="exam_location" id="exam_location"
                               value="{{ study_plan.exam_location }}"
                               class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">
                    </div>
                </div>
                {% endif %}

                <!-- Notes -->
                <div>
                    <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">
                        Notes
                    </label>
                    <textarea name="notes" id="notes" rows="3"
                              class="w-full rounded-lg border-gray-300 focus:border-blue-500 focus:ring-blue-500">{{ study_plan.notes }}</textarea>
                </div>

                <!-- Submit Button -->
                <div class="flex justify-end">
                    <button type="submit"
                            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                        Update Study Plan
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
