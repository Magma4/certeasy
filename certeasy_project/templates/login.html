<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | CertEasy</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
    <div class="text-center mb-6">
      <img src="/static/uploads/ce.png" alt="CertEasy Logo" class="h-12 mx-auto mb-4">
      <h1 class="text-2xl font-bold text-gray-800">Log in to CertEasy</h1>
      <p class="text-gray-500 text-sm mt-1">Welcome back! Let's get you certified.</p>
    </div>
    {% block content %}
    <form id="loginForm" class="space-y-5">
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
        <input type="text" name="username" id="username" required
               class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" name="password" id="password" required
               class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
      </div>
      <button type="submit"
              class="w-full bg-green-600 text-white py-2 px-4 rounded-full font-semibold hover:bg-green-700 transition">
        Login
      </button>
      <a href="/accounts/google/login/" class="block text-center mt-4 text-sm text-gray-600 border border-gray-300 rounded-lg py-2 hover:bg-gray-100 transition">
  <img src="/static/uploads/google.svg" class="inline h-5 w-5 mr-2" alt="Google Icon" />
  Sign in with Google
</a>


      <p class="text-right text-sm mt-2">
    <a href="/forgot-password/" class="text-pink-600 hover:underline font-medium">Forgot your password?</a>
    </p>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Don’t have an account?
      <a href="/signup/" class="text-pink-600 hover:underline font-medium">Sign up</a>
    </p>
  </div>
  {% endblock %}

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const form = e.target;
      const res = await fetch("/api/auth/login/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: form.username.value,
          password: form.password.value
        })
      });

      const data = await res.json();
      if (res.ok) {
          localStorage.setItem("access", data.access);
          localStorage.setItem("refresh", data.refresh);
          window.location.href = "/dashboard/";
      } else {
          alert("Login failed: " + (data.detail || "Unknown error"));
      }
    });
  </script>

</body>
</html>
