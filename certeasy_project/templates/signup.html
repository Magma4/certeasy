<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | CertEasy</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
    <div class="text-center mb-6">
      <img src="/static/uploads/ce.png" alt="CertEasy Logo" class="h-12 mx-auto mb-4">
      <h1 class="text-2xl font-bold text-gray-800">Create your CertEasy account</h1>
      <p class="text-gray-500 text-sm mt-1">Get full access to certification resources.</p>
    </div>

    <form id="signupForm" class="space-y-5">
      <div>
        <label for="first_name" class="block text-sm font-medium text-gray-700">First Name</label>
        <input type="text" name="first_name" id="first_name" required
               class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
      </div>
      <div>
        <label for="last_name" class="block text-sm font-medium text-gray-700">Last Name</label>
        <input type="text" name="last_name" id="last_name" required
               class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
      </div>
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
        <input type="text" name="username" id="username" required
               class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" name="email" id="email" required
               class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
      </div>
      <div>
        <label for="password1" class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" name="password1" id="password1" required
               class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
      </div>
      <div>
        <label for="password2" class="block text-sm font-medium text-gray-700">Confirm Password</label>
        <input type="password" name="password2" id="password2" required
               class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
      </div>
      <button type="submit"
              class="w-full bg-pink-600 text-white py-2 px-4 rounded-full font-semibold hover:bg-pink-700 transition">
        Sign Up
      </button>

      <a href="/accounts/google/login/" class="w-full flex items-center justify-center gap-2 mt-4 text-sm text-gray-600 border border-gray-300 rounded-lg py-2 hover:bg-gray-100 transition">
  <img src="/static/uploads/google.svg" class="h-5 w-5" alt="Google Icon" />
  <span>Sign up with Google</span>
</a>

    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a href="/login/" class="text-green-600 hover:underline font-medium">Log in</a>
    </p>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const form = e.target;
      const res = await fetch("/api/auth/registration/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: form.username.value,
          email: form.email.value,
          first_name: form.first_name.value,
          last_name: form.last_name.value,
          password1: form.password1.value,
          password2: form.password2.value
        })
      });

      const data = await res.json();
      if (res.ok) {
        alert("Signup successful! Please log in.");
        window.location.href = "/login/";
      } else {
        alert("Signup failed: " + JSON.stringify(data));
      }
    });
  </script>

</body>
</html>
