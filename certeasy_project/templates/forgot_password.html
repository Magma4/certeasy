<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password | CertEasy</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
    <div class="text-center mb-6">
      <img src="/static/uploads/ce.png" alt="CertEasy Logo" class="h-12 mx-auto mb-4">
      <h1 class="text-2xl font-bold text-gray-800">Forgot Password</h1>
      <p class="text-gray-500 text-sm mt-1">Enter your email to receive reset instructions.</p>
    </div>

    <form id="resetForm" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" name="email" id="email" required
               class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
      </div>
      <button type="submit"
              class="w-full bg-green-600 text-white py-2 px-4 rounded-full font-semibold hover:bg-green-700 transition">
        Send Reset Link
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Remembered your password?
      <a href="/login/" class="text-pink-600 hover:underline font-medium">Log in</a>
    </p>
  </div>

  <script>
    document.getElementById("resetForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const form = e.target;
      const res = await fetch("/api/auth/password/reset/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: form.email.value })
      });

      if (res.ok) {
        alert("Password reset email sent! Check your console output.");
      } else {
        const data = await res.json();
        alert("Failed: " + JSON.stringify(data));
      }
    });
  </script>

</body>
</html>
