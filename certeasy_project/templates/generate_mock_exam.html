{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
    <h2 class="text-3xl font-bold text-gray-900 mb-6 flex items-center">
      <i class="fas fa-robot text-indigo-500 mr-3"></i> AI Mock Exam Generator
    </h2>
    <p class="text-gray-600 mb-8">Select a certification topic below and our AI will generate a custom 5-question mock exam to test your readiness.</p>

    <div class="space-y-6">
      <div>
        <label for="certification" class="block text-sm font-medium text-gray-700 mb-2">Target Certification</label>
        <select id="certification" class="block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          <option value="">Select a topic...</option>
          {% for cert in certifications %}
            <option value="{{ cert.title }}">{{ cert.title }}</option>
          {% endfor %}
          <option value="General Knowledge">General Knowledge</option>
        </select>
      </div>

      <button id="generateBtn" class="w-full bg-indigo-600 border border-transparent rounded-md shadow-sm py-3 px-4 text-white font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors flex justify-center items-center">
        <span>Generate Exam</span>
      </button>
    </div>

    <div id="loadingState" class="hidden mt-8 text-center text-gray-500">
      <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
      <p>Consulting our AI knowledge base...</p>
    </div>

    <div id="resultsArea" class="mt-8 hidden space-y-6">
      <h3 class="text-xl font-bold text-gray-800 border-b pb-2">Your Custom Mock Exam</h3>
      <div id="examContainer" class="space-y-6"></div>
      <button id="startStudyBtn" class="mt-4 w-full bg-green-600 text-white rounded-md py-2 font-medium hover:bg-green-700 hidden">Take Exam (Mock)</button>
    </div>
  </div>
</div>

<script>
  document.getElementById('generateBtn').addEventListener('click', async () => {
    const certSelect = document.getElementById('certification');
    const topic = certSelect.value;

    if (!topic) {
      alert("Please select a topic.");
      return;
    }

    const btn = document.getElementById('generateBtn');
    const loading = document.getElementById('loadingState');
    const results = document.getElementById('resultsArea');
    const container = document.getElementById('examContainer');
    const startStudyBtn = document.getElementById('startStudyBtn');

    btn.disabled = true;
    loading.classList.remove('hidden');
    results.classList.add('hidden');
    container.innerHTML = '';

    try {
      const response = await fetch('/api/ai/generate/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || ''
        },
        body: JSON.stringify({
          topic: topic,
          type: 'quiz',
          count: 5
        })
      });

      const data = await response.json();

      if (data.quiz && data.quiz.length > 0) {
        data.quiz.forEach((q, i) => {
          const qDiv = document.createElement('div');
          qDiv.className = 'bg-gray-50 p-4 rounded-md border border-gray-200';

          let optionsHtml = '';
          q.options.forEach(opt => {
            optionsHtml += `<li class="ml-4 list-disc text-sm text-gray-600">${opt}</li>`;
          });

          qDiv.innerHTML = `
            <p class="font-bold text-gray-800 mb-2">${i+1}. ${q.question}</p>
            <ul class="space-y-1 mb-2">
              ${optionsHtml}
            </ul>
            <p class="text-sm font-semibold text-green-600 mt-2">Answer: ${q.correct_answer}</p>
          `;
          container.appendChild(qDiv);
        });
        results.classList.remove('hidden');
        startStudyBtn.classList.remove('hidden');
      } else {
        alert("Failed to generate exam.");
      }

    } catch (e) {
      console.error(e);
      alert("An error occurred generating the exam.");
    } finally {
      btn.disabled = false;
      loading.classList.add('hidden');
    }
  });
</script>
{% endblock %}
