<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Via Google - CertEasy</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white shadow-lg rounded-xl p-8 max-w-md w-full text-center">
        <div class="mb-6">
            <img src="/static/uploads/ce.png" alt="CertEasy Logo" class="mx-auto h-12 mb-2">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Sign In Via Google</h1>
            <p class="text-gray-600">You are about to sign in using your Google account.</p>
        </div>
        <form method="post" action="">
            {% csrf_token %}
            <button type="submit" class="w-full py-3 px-6 bg-green-600 text-white rounded-lg font-semibold text-lg shadow hover:bg-green-700 transition flex items-center justify-center">
                <i class="fab fa-google mr-2"></i> Continue with Google
            </button>
        </form>
        <div class="mt-6">
            <a href="/login/" class="text-green-600 hover:underline text-sm"><i class="fas fa-arrow-left mr-1"></i>Back to Login</a>
        </div>
    </div>
</body>
</html>
