{% extends "login.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="bg-white shadow-lg rounded-lg p-8 max-w-md w-full text-center">
    <h2 class="text-2xl font-bold mb-4">Sign in with Google</h2>
    <p class="mb-6 text-gray-600">You're about to sign in using a third-party account.</p>
    <form method="post" action="">
      {% csrf_token %}
      <button type="submit" class="bg-pink-600 hover:bg-pink-700 text-white font-semibold py-2 px-4 rounded">
        Continue with Google
      </button>
    </form>
  </div>
</div>
{% endblock %}
