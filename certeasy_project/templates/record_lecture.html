{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-3xl mx-auto bg-white rounded-lg shadow-lg p-6">
    <h2 class="text-2xl font-bold text-gray-900 mb-4">Record Lecture</h2>
    <p class="text-gray-600 mb-6">Record a lecture and let our AI generate a transcription and summary for you.</p>

    <div class="flex flex-col items-center justify-center p-8 border-2 border-dashed border-gray-300 rounded-lg bg-gray-50">
      <button id="recordButton" class="bg-red-500 hover:bg-red-600 text-white rounded-full p-6 shadow-lg transform transition hover:scale-105">
        <i class="fas fa-microphone text-3xl" id="recordIcon"></i>
      </button>
      <p id="recordStatus" class="mt-4 text-lg font-medium text-gray-700">Ready to record</p>
    </div>

    <div id="resultsArea" class="mt-8 hidden">
      <h3 class="text-xl font-bold text-gray-900 mb-2">Transcription</h3>
      <div id="transcriptionText" class="p-4 bg-gray-100 rounded-md text-gray-800 mb-6"></div>

      <h3 class="text-xl font-bold text-gray-900 mb-2">Summary</h3>
      <div id="summaryText" class="p-4 bg-blue-50 border border-blue-100 rounded-md text-gray-800"></div>
    </div>
  </div>
</div>

<script>
  let mediaRecorder;
  let audioChunks = [];
  const recordButton = document.getElementById('recordButton');
  const recordIcon = document.getElementById('recordIcon');
  const recordStatus = document.getElementById('recordStatus');
  const resultsArea = document.getElementById('resultsArea');
  const transcriptionText = document.getElementById('transcriptionText');
  const summaryText = document.getElementById('summaryText');

  recordButton.addEventListener('click', async () => {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
      // Start recording
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.addEventListener('dataavailable', event => {
          audioChunks.push(event.data);
        });

        mediaRecorder.addEventListener('stop', async () => {
          recordStatus.textContent = 'Processing...';
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const formData = new FormData();
          formData.append('audio', audioBlob, 'lecture.webm');

          try {
            const response = await fetch('/api/ai/transcribe/', {
              method: 'POST',
              body: formData
            });
            const data = await response.json();

            if (data.text) {
              transcriptionText.textContent = data.text;
              summaryText.textContent = data.summary;
              resultsArea.classList.remove('hidden');
            } else {
              alert('Error transcribing audio.');
            }
          } catch (e) {
            console.error(e);
            alert('Failed to send audio to server.');
          } finally {
            recordStatus.textContent = 'Ready to record';
          }
        });

        mediaRecorder.start();
        recordButton.classList.replace('bg-red-500', 'bg-gray-500');
        recordButton.classList.replace('hover:bg-red-600', 'hover:bg-gray-600');
        recordIcon.classList.replace('fa-microphone', 'fa-stop');
        recordStatus.textContent = 'Recording...';
      } catch (err) {
        console.error("Error accessing microphone:", err);
        alert('Could not access microphone.');
      }
    } else {
      // Stop recording
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(track => track.stop());
      recordButton.classList.replace('bg-gray-500', 'bg-red-500');
      recordButton.classList.replace('hover:bg-gray-600', 'hover:bg-red-600');
      recordIcon.classList.replace('fa-stop', 'fa-microphone');
    }
  });
</script>
{% endblock %}
